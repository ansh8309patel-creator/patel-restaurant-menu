<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Owner Login</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <section class="order-section">

    <h1 class="section-title">
      Restaurant Owner Login
    </h1>

    <form
      class="order-form"
      id="login-form"
    >

      <input
        type="email"
        id="email"
        placeholder="Email"
        required
      >

      <input
        type="password"
        id="password"
        placeholder="Password"
        required
      >

      <button type="submit">
        Login
      </button>

    </form>

    <br>

    <form
      class="order-form"
      id="signup-form"
    >

      <input
        type="email"
        id="signup-email"
        placeholder="Create Email"
        required
      >

      <input
        type="password"
        id="signup-password"
        placeholder="Create Password"
        required
      >

      <button type="submit">
        Create Account
      </button>

    </form>

  </section>

  <script
    type="module"
    src="login.js"
  ></script>

</body>

</html>
