<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>QR Generator</title>

  <style>

    body{

      font-family: Arial;

      background:#111;

      color:white;

      text-align:center;

      padding:40px;

    }

    input{

      padding:12px;

      width:250px;

      border:none;

      border-radius:8px;

      margin:10px;

      font-size:18px;

    }

    button{

      padding:12px 20px;

      background:orange;

      border:none;

      border-radius:8px;

      font-size:18px;

      cursor:pointer;

    }

    #qr-container{

      margin-top:30px;

      background:white;

      display:inline-block;

      padding:20px;

      border-radius:10px;

    }

  </style>

</head>

<body>

  <h1>Restaurant Table QR Generator</h1>

  <input
    type="number"
    id="table-number"
    placeholder="Enter Table Number"
  >

  <br>

  <button onclick="generateQR()">
    Generate QR
  </button>

  <div id="qr-container"></div>

  <!-- QR LIBRARY -->

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

  <script>

    function generateQR(){

      const table =
        document.getElementById(
          "table-number"
        ).value;

      if(!table){

        alert("Enter table number");

        return;

      }

      const qrContainer =
        document.getElementById(
          "qr-container"
        );

      qrContainer.innerHTML = "";

      const websiteURL =
        "https://ansh8309patel-creator.github.io/patel-restaurant-menu/index.html?table="
        + table;

      new QRCode(qrContainer, {

        text: websiteURL,

        width: 250,

        height: 250

      });

    }

  </script>

</body>

</html>
