<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Admin Dashboard
  </title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <header>

    <h1>
      Admin Dashboard
    </h1>

    <button
      class="logout-btn"
      onclick="logout()"
    >
      Logout
    </button>

  </header>

  <!-- ADD DISH -->

  <div class="cart">

    <h2>
      Add New Dish
    </h2>

    <input
      type="text"
      id="dish-name"
      placeholder="Dish Name"
    >

    <br><br>

    <input
      type="number"
      id="dish-price"
      placeholder="Dish Price"
    >

    <br><br>

    <input
      type="text"
      id="dish-image"
      placeholder="Image URL"
    >

    <br><br>

    <input
      type="text"
      id="dish-category"
      placeholder="Category"
    >

    <br><br>

    <button onclick="addDish()">
      Add Dish
    </button>

  </div>

  <!-- ALL DISHES -->

  <div
    class="menu"
    id="admin-menu"
  ></div>

  <!-- FIREBASE -->

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <script src="admin.js"></script>

</body>

</html>
