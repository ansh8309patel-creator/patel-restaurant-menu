<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Admin Dashboard
  </title>

  <link
    rel="stylesheet"
    href="style.css"
  >

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

</head>

<body>

  <!-- LOGOUT BUTTON -->

  <button
    onclick="logout()"
    class="logout-btn"
  >
    Logout
  </button>

  <!-- ADMIN SECTION -->

  <section class="admin-section">

    <h1 class="section-title">
      Admin Dashboard
    </h1>

    <form
      id="food-form"
      class="order-form"
    >

      <input
        type="text"
        id="food-name"
        placeholder="Food Name"
        required
      >

      <input
        type="number"
        id="food-price"
        placeholder="Food Price"
        required
      >

      <input
        type="text"
        id="food-image"
        placeholder="Image URL"
        required
      >

      <select
        id="food-category"
        required
      >

        <option value="">
          Select Category
        </option>

        <option value="pizza">
          Pizza
        </option>

        <option value="coffee">
          Coffee
        </option>

        <option value="dessert">
          Dessert
        </option>

      </select>

      <button type="submit">
        Add Food
      </button>

    </form>

  </section>

  <!-- SCRIPT -->

  <script
    type="module"
    src="admin.js"
  ></script>

</body>

</html>
