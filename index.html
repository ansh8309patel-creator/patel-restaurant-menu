<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ansh Restaurant</title><link rel="stylesheet" href="style.css"></head>
<body>
<header><h1>🍽️ Ansh Restaurant</h1>
<div><input id="search" placeholder="Search dishes..." onkeyup="searchMenu()">
<select id="table"><option>Select Table</option><option>Table 1</option><option>Table 2</option><option>Table 3</option><option>Table 4</option><option>Table 5</option><option>Table 6</option><option>Table 7</option><option>Table 8</option><option>Table 9</option><option>Table 10</option></select></div></header>
<div id="menu"></div>
<aside class="cart"><h2>Cart</h2><ul id="cart"></ul>
<p>Subtotal: ₹<span id="sub">0</span></p>
<p>GST (5%): ₹<span id="gst">0</span></p>
<h3>Total: ₹<span id="total">0</span></h3>
<button onclick="bill()">Generate Bill</button>
<h3>⭐ Rating</h3><select id="rating"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select>
<textarea id="review" placeholder="Write review"></textarea>
<button onclick="review()">Submit Review</button>
<div id="reviews"></div></aside>
<script src="script.js"></script></body></html>
